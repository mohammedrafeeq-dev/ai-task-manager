{% extends "base.html" %}
{% block title %}AI Chat{% endblock %}
{% block content %}
<h2>AI Assistant</h2>
<div class="card mt-3">
    <div class="card-body">
        <p class="text-muted">Chat with AI about your tasks.</p>
        <div id="chat-messages" class="mb-3" style="min-height:200px;border:1px solid #ddd;border-radius:4px;padding:10px;overflow-y:auto;max-height:400px;"></div>
        <form id="chat-form" hx-post="/ai/chat/send" hx-target="#chat-messages" hx-swap="beforeend">
            <div class="input-group">
                <input type="text" name="message" class="form-control" placeholder="Ask something...">
                <button class="btn btn-primary" type="submit">Send</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
