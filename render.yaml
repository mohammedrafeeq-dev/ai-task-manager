services:
  - type: web
    name: ai-task-manager
    runtime: python
    repo: https://github.com/mohammedrafeeq-dev/ai-task-manager
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-task-manager-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.13

databases:
  - name: ai-task-manager-db
    region: oregon
    plan: free
    databaseName: taskai
    ipAllowList: []
